  return '<svg class="'+(cls||'')+'" viewBox="0 0 24 24" '+attrs+' aria-hidden="true">'+ICONS[name]+'</svg>';
}

/* ============================ MOUNT ============================ */
function render(){
  const t = I18N[lang];
  document.documentElement.lang = lang;
  document.getElementById("hdr").innerHTML = renderHeader(t);
  document.getElementById("hero-left").innerHTML = renderHeroLeft(t);
  document.getElementById("dynamic").innerHTML =
    renderServices(t)+renderWhy(t)+renderDoctors(t)+renderReviews(t)+renderBooking(t)+renderContact(t);
  document.getElementById("ftr").innerHTML = renderFooter(t);
  document.getElementById("floatWa").setAttribute("aria-label", t.nav.book);
}

/* ============================ EVENTS ============================ */
document.addEventListener("click",(e)=>{
  const act = e.target.closest("[data-act]")?.dataset.act;
  if(act==="menu"){ menuOpen=!menuOpen; render(); return; }
  if(act==="nav"){ menuOpen=false; render(); return; }
  if(act==="langbtn"){ langOpen=!langOpen; render(); return; }
  if(act==="lang"){ lang=e.target.closest("[data-lang]").dataset.lang; localStorage.setItem("otadent-lang",lang); langOpen=false; render(); return; }
  if(act==="rev-prev"||act==="rev-next"){
    const tr=document.getElementById("revTrack"); if(tr){ const card=tr.firstElementChild; const w=card?card.getBoundingClientRect().width+20:320; tr.scrollBy({left:(act==="rev-next"?w:-w),behavior:"smooth"}); }
    return;
  }
  // close lang dropdown when clicking outside
  if(langOpen && !e.target.closest("[data-langroot]")){ langOpen=false; render(); }
});

document.addEventListener("submit",(e)=>{
  if(!e.target.matches("[data-act='book-form']")) return;
  e.preventDefault();
  const t=I18N[lang], f=e.target;
  const name=f.name.value.trim(), phone=f.phone.value.trim();
  const digits=phone.replace(/\D/g,"");
  let ok=true;
  const setErr=(k,msg)=>{ const el=f.querySelector(`[data-err='${k}']`); if(msg){el.textContent=msg;el.classList.remove("hidden");ok=false;} else {el.classList.add("hidden");} };
  setErr("name", name.length<2 ? t.booking.errorName : "");
  setErr("phone", digits.length<10 ? t.booking.errorPhone : "");
  if(!ok) return;
  const lines=[`${t.booking.title}: Ota Dent`,`${t.booking.name}: ${name}`,`${t.booking.phone}: ${phone}`];
  if(f.service.value) lines.push(`${t.booking.service}: ${f.service.value}`);
  if(f.date.value) lines.push(`${t.booking.date}: ${f.date.value}`);
  if(f.time.value) lines.push(`${t.booking.time}: ${f.time.value}`);
  window.open(`${CLINIC.whatsapp}?text=${encodeURIComponent(lines.join("\n"))}`,"_blank","noopener");
  document.getElementById("bookCard").innerHTML=
    `<div class="flex flex-col items-center justify-center gap-4 py-12 text-center">
       ${icon("checkc","size-16 text-cta")}
       <p class="text-lg font-semibold">${t.booking.success}</p>
       <button type="button" onclick="render()" class="inline-flex items-center gap-2 rounded-full border border-border px-5 h-11 text-sm font-semibold hover:bg-muted transition-colors">${t.booking.again}</button>
     </div>`;
});

// Sticky header shadow on scroll
window.addEventListener("scroll",()=>{
  const h=document.getElementById("hdr");
  if(window.scrollY>8){ h.classList.add("shadow-sm","border-b","border-border","bg-background/90"); }
  else { h.classList.remove("shadow-sm","border-b","border-border","bg-background/90"); }
},{passive:true});

render();

// Remove the "Built with Spline" badge from the viewer's shadow DOM
(function killSplineBadge(){
  const sv = document.querySelector("spline-viewer");
  const strip = () => {
    if(!sv || !sv.shadowRoot) return;
    sv.shadowRoot.querySelectorAll("#logo, a[href*='spline'], [part='logo']").forEach(el=>el.remove());
  };
  strip();
  if(sv && sv.shadowRoot){ new MutationObserver(strip).observe(sv.shadowRoot, {childList:true, subtree:true}); }
  let n=0; const iv=setInterval(()=>{ strip(); if(++n>20) clearInterval(iv); }, 300);
})();
</script>
